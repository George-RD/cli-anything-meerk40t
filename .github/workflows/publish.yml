name: Publish to PyPI

# Issue #34: build once, test the wheel, then publish that exact wheel.
# Three gated jobs hand off ONE immutable artifact by its exact numeric
# artifact ID. OIDC (id-token) is granted ONLY to the final publish job.
# The build job builds exactly once; every later job downloads that artifact
# and tests/installs/smokes the wheel -- never rebuilding from source.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------- #
  # 1. test/build — build once, test the wheel, checksum, hand off artifact.    #
  # -------------------------------------------------------------------------- #
  test-build:
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install pinned build tools (no package from source)
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.1 twine==6.1.0 pytest

      - name: Enforce git tag matches setup.py version
        run: |
          TAG="${GITHUB_REF_NAME}"   # e.g. "v1.4.0"
          PKG_VERSION="$(python - <<'PY'
          import re, pathlib
          txt = pathlib.Path('setup.py').read_text()
          m = re.search(r'version\s*=\s*["\']([^"\']+)["\']', txt)
          print(m.group(1))
          PY
          )"
          echo "tag=${TAG} setup.py version=${PKG_VERSION}"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::git tag ${TAG} does not match setup.py version ${PKG_VERSION}"
            exit 1
          fi

      - name: Install package editable (clean PyPI meerk40t)
        run: python -m pip install -e .

      # Source-suite gate per #34: a source-test failure MUST block build,
      # upload, and publish. Runs unfiltered against the real PyPI dependency.
      # Intentionally red today (see issue #51) -- a red gate correctly blocks
      # a real tag/publish until #51 is fixed.
      - name: Run source test suite gate
        run: python -m unittest cli_anything.meerk40t.tests.test_core cli_anything.meerk40t.tests.test_mk_plugin cli_anything.meerk40t.tests.test_full_e2e

      - name: Build sdist and wheel (exactly once)
        run: python -m build

      - name: twine check
        run: twine check dist/*

      - name: Generate checksum allowlist (gates publish; before any install/test)
        run: python scripts/verify_dist.py generate dist

      - name: Install the built wheel into a clean venv
        run: |
          python -m venv testenv
          ./testenv/bin/python -m pip install --upgrade pip
          # Installs the built wheel only (meerk40t>=0.9.0 resolved from PyPI,
          # exactly as a consumer would install it) -- never from source.
          ./testenv/bin/python -m pip install dist/*.whl pytest
      # Validate THE BUILT WHEEL (not source): install into a clean venv and run
      # from OUTSIDE the checkout. The test module is imported FROM THE INSTALLED
      # WHEEL (--pyargs resolves it under site-packages), and we assert the
      # production package sits under the clean venv's prefix -- so we truly
      # exercise the artifact, never the source tree.
      - name: Validate the wheel artifact (release integrity + smoke)
        run: |
          TEST_PY="$GITHUB_WORKSPACE/testenv/bin/python"
          cd "$RUNNER_TEMP"
          "$TEST_PY" -c "import cli_anything.meerk40t, sys; from pathlib import Path; assert Path(cli_anything.meerk40t.__file__).is_relative_to(Path(sys.prefix)), cli_anything.meerk40t.__file__; print('wheel residency:', cli_anything.meerk40t.__file__)"
          RELEASE_SCRIPTS_DIR="$GITHUB_WORKSPACE/scripts" \
            "$TEST_PY" -m pytest --import-mode=importlib --pyargs \
              cli_anything.meerk40t.tests.test_release_integrity -v
          "$TEST_PY" "$GITHUB_WORKSPACE/scripts/smoke_installed_wheel.py"
      - name: Re-verify checksum allowlist after tests (bytes unchanged)
        run: python scripts/verify_dist.py verify dist

      - name: Upload distribution artifact
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist

  # -------------------------------------------------------------------------- #
  # 2. clean-wheel — verify handoff + smoke-test the installed wheel in a       #
  #    pristine environment (no build step, no OIDC).                            #
  # -------------------------------------------------------------------------- #
  clean-wheel:
    needs: test-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (scripts only)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Download the exact artifact from test-build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.test-build.outputs.artifact-id }}
          merge-multiple: true
          path: dist

      - name: Verify checksum allowlist (exact wheel/sdist, no extras)
        run: python scripts/verify_dist.py verify dist

      - name: Install the wheel into a clean venv
        run: |
          python -m venv cleanenv
          ./cleanenv/bin/python -m pip install --upgrade pip
          ./cleanenv/bin/python -m pip install dist/*.whl

      - name: Smoke test the installed wheel
        run: ./cleanenv/bin/python scripts/smoke_installed_wheel.py

  # -------------------------------------------------------------------------- #
  # 3. publish — re-verify the SAME artifact, then OIDC-publish it.             #
  #    id-token is granted here and nowhere else.                               #
  # -------------------------------------------------------------------------- #
  publish:
    needs: [test-build, clean-wheel]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: pypi
    steps:
      - name: Checkout (scripts only)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Download the exact artifact from test-build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.test-build.outputs.artifact-id }}
          merge-multiple: true
          path: dist

      - name: Re-verify checksum allowlist before publishing
        run: python scripts/verify_dist.py verify dist

      # The manifest is an integrity gate, not a distribution file. Strip it
      # before publishing so twine only sees the wheel + sdist.
      - name: Drop the checksum manifest (publish artifact only)
        run: rm -f dist/SHA256SUMS

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          print-hash: true
