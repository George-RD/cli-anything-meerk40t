name: Profile to PR

# Opens a pull request that adds a community machine profile when an issue
# is opened, edited, or labelled with `community-profile`. The issue body must
# contain the profile JSON inside a ```json code block.
#
# The entire flow lives in cli_anything/meerk40t/utils/profile_to_pr.py and is
# exercised by the unittest suite (TestProfileToPr* in test_core.py) with
# injected gh/git runners, so the fail-closed behaviour below is executable
# rather than asserted "by construction":
#   * Every gh/git result is checked; any failure fails the job visibly.
#   * The live issue body, label, state, and re-parsed profile are refetched
#     and re-validated immediately before branch creation AND immediately
#     before push (optimistic concurrency). If anything changed since the
#     initial validation, publication is aborted (nonzero) and nothing is
#     pushed or opened.
#   * The branch is created collision-free from the canonical `main` base; a
#     local/remote collision fails closed (no force-push, no auto-merge).
#   * No path merges profile content automatically.

on:
  issues:
    types: [opened, edited, labeled]

# A stuck or overlapping run must not race a newer one for the same issue.
concurrency:
  group: profile-to-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  profile-to-pr:
    if: >-
      contains(github.event.issue.labels.*.name, 'community-profile')
    runs-on: ubuntu-latest
    # Minimal, explicit permissions: push the profile branch, open the PR,
    # and comment on validation failures only.
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout canonical base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: main
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install package (reuse the canonical validator)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install .

      # Single tested source of truth. cli_main() wires the real gh/git
      # runners and runs validate -> re-verify #1 -> collision probe ->
      # checkout -> commit -> re-verify #2 -> push -> pr create. Any drift or
      # subprocess failure exits nonzero and fails the job.
      - name: Validate, re-verify, and open profile PR
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python -m cli_anything.meerk40t.utils.profile_to_pr
